body:
  text: 宋罽賓三藏曇摩蜜多譯如是我聞一時佛住佉陀羅山依正覺仙人所住之處與千二百五十比丘俱賢劫千菩薩彌勒為首爾時長老優波離即從坐起整衣服為佛作禮白佛言世尊先於功德經中説虛空藏菩薩摩訶薩名能除一切惡不善業治王旃陀羅乃至沙門旃陀羅諸惡律儀如此惡事若欲治當云何觀虛空藏菩薩設得見者云何共住布薩僧事若優婆塞破五戒犯八戒齋出家比丘比丘尼沙彌沙彌尼式叉摩尼犯四重禁在家菩薩毀六重法出家菩薩犯八重禁如是過人世尊先於毗尼中説決定驅儐如大石破今於此經説大悲虛空藏能救諸苦及説呪以除罪咎設有此人云何知之以何為證惟願天尊分別解説佛告優波離汝及未來世一切善持毗尼者應當教此犯罪衆生安慰其意世尊大慈弘誓無量不捨一切於深功德經説治罪法名決定毗尼有三十五佛救世大悲汝當敬禮汝敬禮時當著慚愧衣如眼生瘡深生愧恥如癩病人隨良醫教汝亦如是應生慚愧既慚愧已一日乃至七日禮十方佛稱三十五佛名別稱大悲虛空藏菩薩名澡浴身體燒衆名香堅黑沈水明星出時長跪合掌悲泣雨淚稱虛空藏白言大德大悲菩薩愍念我故為我現身爾時當起是想是虛空藏菩薩頂上有如意珠其如意珠作紫金色若見如意珠即見天冠此天冠中有三十五佛像現如意珠中十方佛像現虛空藏菩薩身長二十由旬若現大身與觀世音等此菩薩結加趺坐手捉如意珠王其如意珠演衆法音與毗尼合若此菩薩憐愍衆生故作比丘像及一切色像若於夢中若坐禪時以摩尼珠印印彼人臂印文有除罪字得此字已還入僧中如本説戒若優婆塞得此字者不障出家設不得此字便使空中有聲唱言罪滅罪滅若無空聲使知毗尼者夢見虛空藏菩薩告言毗尼薩毗尼薩某甲比丘某甲優婆塞更令懺悔一日乃至七七日禮三十五佛虛空藏菩薩力故汝罪輕微知法者復教令塗治圊廁經八百日日日告言汝作不淨事汝今一心塗一切廁莫令人知塗已澡浴禮三十五佛稱虛空藏向十二部經五體投地説汝過惡如是懺悔復經三七日爾時智者應集親厚於佛像前稱三十五佛名稱文殊師利稱賢劫菩薩為其作證更白羯磨如前受戒法此人因苦行力故罪業永除不障三種菩提業佛告優波離汝持是觀虛空藏法為未來世無慚愧衆生多犯惡者廣分別説説是語時時虛空藏菩薩結加趺坐放金色光如意珠中見三十五佛已白佛言世尊我此如意珠寶從首楞嚴出是故衆生見珠者得如意自在爾時世尊敕優波離汝持此經不得為多衆廣説但為一人持毗尼者為未來世無眼目衆生作眼目故慎莫忘失時優波離聞佛所説歡喜奉行右觀虛空藏菩薩經按開元録係是單譯止有二紙經後舊尚有八紙經文準校勘大藏竹堂講師批該是後人採集虛空藏經呪并諸經中佛名及呪以為勸世修行法不可連在觀虛空藏經後下竺本及福本皆無又按此經世尊先於深功德經説治罪法名決定毗尼有三十五佛者即出寶積經第九十卷優波離會與決定毗尼經同本餘文皆例此然詳觀所批理亦可以意會徒存似是姑為刪之阿彌隸奢阿彌隸奢迦留尼迦一遮羅遮羅毗遮羅珊遮羅迦留尼迦二羅茂羅羅茂羅毗伽陀隸三摩懵呿復闍摩那迦留尼迦四真陀摩尼富羅栘迦留尼迦五薩婆阿奢彌咃𠱀栘六陀潰陀利七破仇破仇八留坻脾脾伽仇九儨脾脾伽仇迦留尼迦十富隸栘埵摩摩阿奢十一薩埵波咃遮阿輸迦竭坘莎呵十二三十五佛名釋迦牟尼佛金剛不壞身佛寶光佛龍尊王佛精進軍佛精進喜佛寶力佛寶月光明佛現無愚佛寶月佛無垢佛離垢佛勇施佛清淨佛清淨施佛婆留那佛水天佛堅德佛栴檀德佛無量光佛光德佛無量氣光佛那羅延佛功德華佛蓮華遊戲神通佛才功德佛念功德佛善名稱佛洪炎幢王佛善遊步功德佛鬪戰勝佛善遊步佛周匝莊嚴功德佛寶蓮華遊步功德佛蓮華光善住娑羅樹王佛過去三十五佛名虛空藏菩薩陀羅尼多擲哆阿彌闍迦留尼迦遮羅遮羅毗遮羅迦留尼迦茂羅羅囉茂羅毗迦陀羅摩摩劫呿復奢摩那迦留尼迦真多摩尼富羅栘迦留尼迦薩埵舍摩哆婆蛇阿若陀梨婆破窮窮留提毗脾伽窮持栗履毗脾加窮迦留尼迦富梨蛇𮍜音兜摩摩阿舍薩埵波利波遮阿輸迦竭提莎呵若有衆生種種諸病逼切其身其心散亂聾盲瘖啞諸根不具肢節各異時有死相如是等事一向稱虛空藏菩薩摩訶薩名除諸病故欲無病故燒沈水黑堅沈水若多竭流香禮虛空大善丈夫是善丈夫於夜夢中作婆羅門像在其人前即現釋像功德天像妙音天像或羅剎之像或大臣之像或兵吏之像良藥之像或父母之像於夜夢中在病人前如實説種種隨病湯藥等者一服除差無餘復有如是取營求事欲多問義若寂靜處欲行禪定欲智慧欲得名稱欲求巧欲求自在欲得妙色欲封欲得勢力欲財能欲得妙聲欲得子息欲得眷屬欲得功德欲得布施持戒忍辱精進禪定欲得義語欲得人恭敬欲脫諸惡災止於施乃至住慧欲得長命欲得種種所須之具得以能用是人禮虛空藏菩薩摩訶薩若阿練若在林中若在路地燒於沈水黑堅沈水若多竭流香至心合掌五體投地遍禮十方説陀羅尼句即得所願過去五十三佛名普光佛普明佛普靜佛多摩羅跋栴檀香佛栴檀光佛摩尼幢佛歡喜藏摩尼寶積佛一切世間樂見上大精進佛摩尼幢燈光佛慧炬照佛海德明光佛金剛牢疆普散金光佛大強精進勇猛佛大悲光佛慈力王佛慈藏佛栴檀窟莊嚴勝佛賢善首佛善意佛廣莊嚴佛金華光佛寶蓋照空自在王佛虛空寶華光佛琉璃莊嚴王佛普現色身光佛不動智光佛降伏諸魔王佛才光明佛智慧勝佛彌勒仙光佛世靜光佛善寂月音妙尊智王佛龍種上尊王佛日月光佛日月珠光佛慧幡勝王佛師子吼自在力王佛妙音勝佛常光幢佛觀世燈佛慧威燈王佛法勝王佛須彌光佛須蔓那華光佛優曇鉢羅華殊勝王佛大慧力王佛阿閦毗歡喜光佛無量音聲王佛才光佛金海光佛山海慧自在通王佛大通光佛一切法常滿王佛若有善男子善女人及餘一切衆生得聞是五十三佛名者是人於百千萬億阿僧祇劫不墮惡道若復有人能稱是五十三佛名者生生之處常得值遇十方諸佛若有人能至心敬禮五十三佛名者除滅四重五逆及謗方等皆悉清淨毗婆尸佛尸棄佛毗舍佉佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛東方寶光月殿妙尊音王佛南方樹根華王佛西方造王神通炎華佛北方月殿清淨佛下方善寂月音王佛上方無數精進願首佛佛告寶網菩薩若善男子善女人起立講堂如三千大千世界講堂內造立精舍計有億數皆以赤栴檀而合成之以一切樂具供養諸佛於百千劫於佛滅後復起塔廟幢幡華蓋寶瓶香爐伎樂歌歎於意云何是人功德寧為多不寶網白佛甚多世尊佛言不如有人諷誦念此六方佛名恭敬作禮其人世世常生轉輪王家端正威德臨欲終時百億諸佛授手令不墮三惡趣設有五逆重罪應入地獄令現世輕受頭痛則除以此當之不入三惡道受是故至心恭敬作禮廣説如是寶網童子經東方須彌燈光明佛東南方寶藏莊嚴佛南方栴檀摩尼光佛西南方金海自在王佛西方大悲光明王佛西北方優鉢羅蓮華勝佛北方蓮華鬚莊嚴王佛東北方金剛自在王佛上方殊勝月王佛下方日月光王佛舍利弗若有菩薩犯於初戒於十衆前以正直心殷重懺悔手犯戒者於五衆前以正直心殷重懺悔手捉女人眼見惡心或一人二人前以正直心殷重懺悔若有菩薩成就五無間罪犯於女人或犯男子或有手犯犯塔犯僧如是等餘犯菩薩應當於三十五佛邊所犯重罪晝夜獨處至心懺悔懺悔法者歸依佛歸依法歸依僧妙音菩薩文殊師利菩薩藥王菩薩勇施菩薩宿王華菩薩上行意菩薩莊嚴王菩薩藥上菩薩得勤精進力菩薩觀世音菩薩無盡意菩薩持地菩薩莊嚴相菩薩普賢菩薩是十四菩薩法華中妙音來所欲見若念禮者得現世福種種行菩薩無量行菩薩清淨行菩薩建立行菩薩誦四菩薩名念禮者命終不經三惡道東方空無菩薩南方善思議菩薩西方喜信淨菩薩北方神通華菩薩念禮四菩薩得三世福經趣佛道跋陀和菩薩羅鄰那竭菩薩憍曰𮍜菩薩那羅達菩薩須深彌菩薩摩訶須薩和菩薩因坘達菩薩和倫調菩薩是八菩薩從般舟中出是八人求道以來無央數劫於今未取佛願言彼十方天下人民皆得佛道有急疾皆呼我八人名字即得解脫壽命終時我八人便當飛往迎逆之誦禮八菩薩者得現世福命終八人迎接將往極樂國土化生蓮華中作無生菩薩舍利弗目揵連大迦葉須菩提此四聲聞念禮者令人得現世福富樓那阿難羅睺羅聲聞士此三權聲聞念禮者令人得大乘福第一分舍利在拘尸那國城第二分舍利在波婆國第三分舍利在羅摩國第四分舍利在庶勒國第五分舍利在毗䨲國第六分舍利在毗耶離國第七分舍利在迦毗羅國第八分舍利在摩伽他國第九分舍利在瓶頭羅國第十分舍利在羅延那國佛初去世後起此十塔當爾時閻浮提二十八萬里中正有十塔念禮者得無量福德捨身不墮三惡道天上四塔者忉利天城東照明園中有佛髮塔忉利天城南麁澀園中有佛衣塔忉利天城西歡喜園中有佛鉢塔忉利天城北駕御園中有佛牙塔人間四塔者第一所生塔在拘薩羅國迦毗羅城嵐鞞林第二道場塔在摩伽陀國伽耶城菩提樹下第三轉法輪塔在伽尸國波羅㮈城鹿野苑中第四般涅槃塔在摩羅國拘尸羅城雙樹間人間八塔念禮亦令人得現世福集法悅捨苦陀羅尼經南無佛陀耶南無達摩耶南無僧伽耶南無毗首陀遮耶南無阿伽竭浮遮耶南無摩訶薩婆婆伽利耶多擲姪哆敕賀反林彌利婆簸婆彌留遮呵檀摩陀那闍那唏希知汦底婆居婆遮耶那耶波羅薩婆摩呵唏知底利殃求知利默求知利比婆薩婆耶那比林婆闍呵陀舍耶輸薩婆娑羅三蔓無拌反鉢汦波波波利摩訶阿那莎呵爾時佛告諸大衆言吾本無數劫中處於凡夫時字遮他陀在加倫邏國作於商客販賣治業虛妄無實造諸惡行不可稱計淫荒無道不可具説是時愚癡害父愛母經數年中舉國人民一皆知之稱聲唱言是遮他陀害父愛母經今數年吾時思念與六畜無異更無人事時於加倫邏國跳城奔走趣於深澤時此國王名毗闍告令國中人民此遮他陀淫荒無道致為此事其有能得此人者當重賜寶物時此國人各各受募欲捕吾身是時驚怖即出國作沙門在於他國修行十善坐禪學道晝夜泣淚經三十七年以五逆罪障故心不定憂悲叵處以三十七年中在於山窟常舉聲泣苦哉苦哉當以何心去此苦也悲歎下窟乞食時道中地得一大鉢中有一匣經更無餘經唯有集法悅捨苦陀羅尼説過去恆河沙諸佛泥洹時常在毗悅羅國説此陀羅尼付諸大菩薩後有人得聞此陀羅尼者此人過去世時修持五戒十善當令得聞有人雖聞而不在心不修集者是名無緣此陀羅尼能除去百億劫生死五逆大罪若有人受持讀誦者終不墮於三塗地獄餓鬼畜生何以故過去諸佛以欲泥洹時會當説之尊重歎仰稱其功德不可計量付諸菩薩後有衆生得聞此陀羅尼者修習著心福報難計猶如須彌寶海凡夫不能得量若有人作諸惡行竊聞此陀羅尼名不及修習一用在懷墮於地獄一切地獄中蒙此人恩苦痛不行有人能行現身精勤修習得者覩見百千萬佛剎土得福無量不可具説唯有諸佛與諸菩薩乃能究盡聲聞二乘人者不能得知何以故此陀羅尼非一佛二佛所説過去恆河沙諸佛所説是時吾得此經即不乞食歡喜向窟到於窟中燒香禮拜悲淚讚仰於窟中修習讀誦經一年始得以罪業障故不能得入心懷是時吾即以秋月夜洗浴修行經一七日如童子初學憒憒者不少便更行於七日亦如是憒憒無異心中愁惱不知云何意中沾思此陀羅尼字經於數反心中忽定我時欣悅如人地得百千斤金人無知者內欣不止吾時亦然修行數年飛行無礙覩見十方三世諸佛後有行者如法行之虛空藏菩薩陀羅尼呪南無佛兜佛多摩訶目揵連莎多擲絰他敕賀反欹利吉利彌利踟利薩婆伽欹利彌利薩婆伽彌利莎呵此陀羅尼要月十四日十五日明星出時誦之八百遍燒好沈水香香煙不絶要用黃花八百枚令人得福若善男子現身安隱求心中所願無不獲得若是女人化成男子能至心一日一夜六時行道誦持之者一劫二劫之罪永不入惡趣要用春秋涼時三月四月八月九月
